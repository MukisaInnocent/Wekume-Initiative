services:
  # Backend Service
  - type: web
    name: wekume-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wekume-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false


  # Frontend Service
  - type: web
    name: wekume-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: wekume-db
    plan: free
    databaseName: wekume
    user: wekume_user

version: "1"

